          text: "好尴尬…我不想引人注目…我想消失…"
        - ID: 2
          text: "你…没事吧⁉"
        - ID: 3
          text: "这家伙怎么看不懂气氛的…？"
  English: 
    - TextList: *JSON-Sample-In
    - TextList:
        - ID: 1
          text: "I'm embarrassed... I don't want to stand out... I want to disappear..."
        - ID: 2
          text: "Are you okay?!"
