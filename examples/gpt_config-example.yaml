        - ID: 3
          text: "이 녀석, 뭐야? 분위기 못 읽는 거야...?"
  # Mongolian (Монгол хэл) JSON samples
  # Tips for Mongolian translation:
  # - Use proper Cyrillic encoding (UTF-8)
  # - Maintain natural Mongolian word order
  # - Adapt Japanese expressions to Mongolian cultural context
  # - Preserve emotional tone and character voice
  # - Use appropriate formality levels
  # - Include diverse examples for better accuracy
  # Note: Use both 'Mongolian' (for direct match) and 'mn' (ISO 639-1 for langcodes)
  Mongolian: &mongolian-json-sample  # Direct match fallback
    - TextList: *JSON-Sample-In
    - TextList:
        - ID: 1
          text: "Ичихээс... Би харагдахыг хүсэхгүй байна... Би алга болмоор байна..."
